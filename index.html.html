<style>
:root {
  --bg:       #f0f4f8;
  --card:     #ffffff;
  --dark:     #0f1923;
  --accent:   #e8471a;
  --accent2:  #ff6b3d;
  --blue:     #1e40af;
  --green:    #059669;
  --yellow:   #d97706;
  --text:     #1a2332;
  --muted:    #64748b;
  --border:   #e2e8f0;
  --shadow:   0 2px 12px rgba(0,0,0,0.08);
  --radius:   12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--dark);
  color: white;
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.header-logo {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.2px;
}
.header-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }
.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
}
.pill {
  background: rgba(232,71,26,0.15);
  color: var(--accent2);
  border: 1px solid rgba(232,71,26,0.3);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 11px;
  font-weight: 600;
}
.pill.green {
  background: rgba(5,150,105,0.15);
  color: #10b981;
  border-color: rgba(5,150,105,0.3);
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: auto 1fr;
  gap: 0;
  height: calc(100vh - 58px);
}

/* ── KPI STRIP ── */
.kpi-strip {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 14px 20px;
  background: var(--dark);
  border-bottom: 3px solid var(--accent);
}
.kpi {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background .2s;
}
.kpi:hover { background: rgba(255,255,255,0.09); }
.kpi-icon {
  font-size: 22px;
  width: 40px; height: 40px;
  background: rgba(232,71,26,0.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.kpi-icon.b { background: rgba(30,64,175,0.25); }
.kpi-icon.g { background: rgba(5,150,105,0.25); }
.kpi-icon.y { background: rgba(217,119,6,0.25); }
.kpi-icon.p { background: rgba(124,58,237,0.25); }
.kpi-num {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: white;
  line-height: 1;
}
.kpi-lbl { font-size: 11px; color: #94a3b8; margin-top: 2px; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-section {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section h3 {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* Search */
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px 8px 32px;
  font-size: 13px;
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
  background: var(--bg);
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap::before {
  content: "🔍"; position: absolute;
  left: 9px; top: 50%; transform: translateY(-50%);
  font-size: 12px;
}

/* Botones */
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn {
  flex: 1; padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: white;
  color: var(--text);
  font-size: 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.filled { background: var(--accent); border-color: var(--accent); color: white; }
.btn.filled:hover { background: var(--accent2); }

/* Lista barrios */
.barrio-scroll { flex: 1; overflow-y: auto; padding: 6px 8px; }
.barrio-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 8px;
  cursor: pointer; transition: background .15s;
  user-select: none;
}
.barrio-item:hover { background: var(--bg); }
.barrio-item.on { background: #fff5f2; }
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0; border: 2px solid rgba(0,0,0,0.1);
}
.bname { flex: 1; font-size: 12.5px; }
.bcnt {
  font-size: 11px; color: var(--muted);
  background: var(--bg); border-radius: 10px;
  padding: 1px 7px; font-weight: 500;
}

/* Mini chart */
.mini-chart { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.bar-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.bar-label { font-size: 11px; color: var(--muted); width: 110px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.bar-val { font-size: 11px; font-weight: 600; color: var(--text); width: 20px; text-align: right; }

/* Stats bottom */
.sidebar-stats {
  padding: 10px 16px;
  display: flex; gap: 8px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.sstat {
  flex: 1; text-align: center;
  background: white; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px;
}
.sstat .n {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800; color: var(--accent);
}
.sstat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── MAPA ── */
#map { width: 100%; height: 100%; }
.leaflet-popup-content-wrapper {
  border-radius: var(--radius);
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  font-family: 'IBM Plex Sans', sans-serif;
  border: 1px solid var(--border);
}
.popup-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--text); }
.popup-barrio { color: var(--accent); font-size: 12px; font-weight: 500; }
.popup-coords { color: var(--muted); font-size: 11px; margin-top: 4px; font-family: monospace; }
.popup-id { float: right; background: var(--bg); border-radius: 5px; padding: 1px 6px; font-size: 10px; color: var(--muted); }
</style>
</head>

  {id:89, dir:"CL120 # 26 I - 80",        barrio:"MANUELA BELTRAN",         lat:3.45220, lng:-76.47840},
  {id:90, dir:"CR 26J #73B-81",           barrio:"MARROQUIN II",            lat:3.43530, lng:-76.47860},
  {id:91, dir:"CR 26H2 #73B-11",          barrio:"MARROQUIN II",            lat:3.43500, lng:-76.47900},
  {id:92, dir:"CR 26 F1 #73-59",          barrio:"MARROQUIN II",            lat:3.43470, lng:-76.47920},
  {id:93, dir:"CR 26 I2 #80-24",          barrio:"MARROQUIN II",            lat:3.43920, lng:-76.47880},

  {id:95, dir:"CL 108 # 26 H1 - 59",      barrio:"MANUELA BELTRAN",         lat:3.44850, lng:-76.47870},

  {id:99, dir:"CARRERA 26B # 75B 35",     barrio:"ALIRIO MORA BELTRAN",     lat:3.43710, lng:-76.48160}
];

// ── COLORES ────────────────────────────────────────────────────────────────
const COLS = ["#e8471a","#1e40af","#059669","#d97706","#7c3aed",
              "#db2777","#0891b2","#65a30d","#dc2626","#4f46e5",
              "#0d9488","#c2410c","#9333ea","#0284c7","#16a34a",
              "#ea580c","#a21caf","#0369a1"];

const barrios = [...new Set(puntos.map(p=>p.barrio))].sort();
const cmap = {};
barrios.forEach((b,i) => cmap[b] = COLS[i % COLS.length]);

// ── MAPA ──────────────────────────────────────────────────────────────────
const map = L.map('map').setView([3.4430, -76.4780], 14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CartoDB', maxZoom:19
}).addTo(map);

function mkIcon(c) {
  return L.divIcon({
    className:'',
    html:`<div style="width:12px;height:12px;background:${c};border-radius:50%;border:2.5px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.3)"></div>`,
    iconSize:[12,12], iconAnchor:[6,6]
  });
}

let mks = {};
let active = new Set(barrios);

puntos.forEach(p => {
  const m = L.marker([p.lat,p.lng],{icon:mkIcon(cmap[p.barrio])})
    .bindPopup(`
      <span class="popup-id">#${p.id}</span>
      <div class="popup-title">${p.dir}</div>
      <div class="popup-barrio">▸ ${p.barrio}</div>
      <div class="popup-coords">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div>
    `);
  m.addTo(map);
  mks[p.id] = {m, barrio:p.barrio};
});

// ── SIDEBAR LISTA ─────────────────────────────────────────────────────────
function cnt(b){ return puntos.filter(p=>p.barrio===b).length; }
const maxCnt = Math.max(...barrios.map(cnt));

function renderList(q=''){
  const el = document.getElementById('barrioList');
  el.innerHTML='';
  barrios.filter(b=>b.toLowerCase().includes(q.toLowerCase())).forEach(b=>{
    const on = active.has(b);
    const d = document.createElement('div');
    d.className='barrio-item'+(on?' on':'');
    d.innerHTML=`
      <div class="dot" style="background:${on?cmap[b]:'#cbd5e1'}"></div>
      <span class="bname">${b}</span>
      <span class="bcnt">${cnt(b)}</span>`;
    d.onclick=()=>toggle(b);
    el.appendChild(d);
  });
  renderChart(q);
}

function renderChart(q=''){
  const el = document.getElementById('chartBars');
  el.innerHTML='';
  barrios.filter(b=>b.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b2)=>cnt(b2)-cnt(a)).slice(0,6).forEach(b=>{
    const pct = Math.round(cnt(b)/maxCnt*100);
    el.innerHTML+=`
      <div class="bar-row">
        <div class="bar-label" title="${b}">${b}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cmap[b]}"></div></div>
        <div class="bar-val">${cnt(b)}</div>
      </div>`;
  });
}

function toggle(b){
  active.has(b)?active.delete(b):active.add(b);
  refresh(); renderList(document.getElementById('searchB').value);
}
function selAll(){ active=new Set(barrios); refresh(); renderList(document.getElementById('searchB').value); }
function selNone(){ active.clear(); refresh(); renderList(document.getElementById('searchB').value); }

function refresh(){
  let v=0;
  Object.values(mks).forEach(({m,barrio})=>{
    if(active.has(barrio)){ m.addTo(map); v++; } else map.removeLayer(m);
  });
  const topB = [...active].sort((a,b2)=>cnt(b2)-cnt(a))[0]||'—';
  document.getElementById('kVisible').textContent = v;
  document.getElementById('kBarrios').textContent = active.size;
  document.getElementById('kTop').textContent     = topB.split(' ')[0];
  document.getElementById('kPct').textContent     = Math.round(v/puntos.length*100)+'%';
  document.getElementById('sVis').textContent     = v;
  document.getElementById('sBrr').textContent     = active.size;
  document.getElementById('hBadge').textContent   = v+' registros';
}

document.getElementById('searchB').addEventListener('input', e=>renderList(e.target.value));

// ── INIT ──────────────────────────────────────────────────────────────────
const topInicio = barrios.sort((a,b)=>cnt(b)-cnt(a))[0];
document.getElementById('kTop').textContent = topInicio.split(' ')[0];
renderList();
</script>
</body>
